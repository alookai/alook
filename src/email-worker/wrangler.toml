name = "alook-email-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_id = "FILL_AFTER_CREATE"
database_name = "alook-app"

[[r2_buckets]]
binding = "EMAIL_BUCKET"
bucket_name = "alook-emails"

[[services]]
binding = "WEB_SERVICE"
service = "alook-web"
