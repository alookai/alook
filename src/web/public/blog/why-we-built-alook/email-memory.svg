<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#141210"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-bright" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main horizontal timeline -->
  <g filter="url(#glow)">
    <path d="M60,200 C150,200 250,200 400,200 C500,200 600,200 740,200" fill="none" stroke="#C9A33A" stroke-width="2" stroke-linecap="round" opacity="0.7" filter="url(#rough)"/>
    <!-- small tick marks along timeline -->
    <path d="M120,195 L120,205" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <path d="M220,195 L220,205" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <path d="M340,195 L340,205" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <path d="M460,195 L460,205" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <path d="M570,195 L570,205" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <path d="M670,195 L670,205" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
  </g>

  <!-- Envelope 1 (oldest, dimmest) — on timeline left -->
  <g filter="url(#glow)">
    <path d="M110,175 L140,175 L140,195 L110,195 Z" fill="none" stroke="#C9A33A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" filter="url(#rough)"/>
    <path d="M110,175 L125,186 L140,175" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#rough)"/>
    <!-- stem to timeline -->
    <path d="M125,195 L125,200" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
  </g>

  <!-- Envelope 2 -->
  <g filter="url(#glow)">
    <path d="M210,172 L242,172 L242,194 L210,194 Z" fill="none" stroke="#C9A33A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" filter="url(#rough)"/>
    <path d="M210,172 L226,184 L242,172" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" filter="url(#rough)"/>
    <path d="M226,194 L226,200" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.35" filter="url(#rough)"/>
  </g>

  <!-- Envelope 3 -->
  <g filter="url(#glow)">
    <path d="M325,168 L360,168 L360,192 L325,192 Z" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" filter="url(#rough)"/>
    <path d="M325,168 L342.5,181 L360,168" fill="none" stroke="#C9A33A" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.45" filter="url(#rough)"/>
    <path d="M342.5,192 L342.5,200" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.4" filter="url(#rough)"/>
  </g>

  <!-- Envelope 4 -->
  <g filter="url(#glow)">
    <path d="M445,165 L482,165 L482,192 L445,192 Z" fill="none" stroke="#C9A33A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#rough)"/>
    <path d="M445,165 L463.5,179 L482,165" fill="none" stroke="#C9A33A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" filter="url(#rough)"/>
    <path d="M463.5,192 L463.5,200" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.5" filter="url(#rough)"/>
  </g>

  <!-- Envelope 5 -->
  <g filter="url(#glow)">
    <path d="M555,162 L594,162 L594,190 L555,190 Z" fill="none" stroke="#C9A33A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75" filter="url(#rough)"/>
    <path d="M555,162 L574.5,177 L594,162" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" filter="url(#rough)"/>
    <path d="M574.5,190 L574.5,200" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.6" filter="url(#rough)"/>
  </g>

  <!-- Envelope 6 (most recent, brightest) -->
  <g filter="url(#glow-bright)">
    <path d="M655,158 L698,158 L698,188 L655,188 Z" fill="none" stroke="#C9A33A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" filter="url(#rough)"/>
    <path d="M655,158 L676.5,174 L698,158" fill="none" stroke="#C9A33A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#rough)"/>
    <path d="M676.5,188 L676.5,200" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.8" filter="url(#rough)"/>
  </g>

  <!-- ABOVE the line: web of context threads connecting envelopes -->
  <g filter="url(#glow-soft)">
    <!-- Thread: env1 to env2 -->
    <path d="M125,175 C160,130 195,128 226,172" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <!-- Thread: env2 to env3 -->
    <path d="M226,172 C260,120 300,118 342.5,168" fill="none" stroke="#C9A33A" stroke-width="0.9" stroke-linecap="round" opacity="0.35" filter="url(#rough)"/>
    <!-- Thread: env1 to env3 (long-range) -->
    <path d="M125,175 C180,90 280,85 342.5,168" fill="none" stroke="#C9A33A" stroke-width="0.7" stroke-linecap="round" opacity="0.2" filter="url(#rough)"/>
    <!-- Thread: env3 to env4 -->
    <path d="M342.5,168 C380,110 420,108 463.5,165" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.4" filter="url(#rough)"/>
    <!-- Thread: env2 to env4 (long-range) -->
    <path d="M226,172 C300,80 400,78 463.5,165" fill="none" stroke="#C9A33A" stroke-width="0.7" stroke-linecap="round" opacity="0.25" filter="url(#rough)"/>
    <!-- Thread: env4 to env5 -->
    <path d="M463.5,165 C500,105 540,102 574.5,162" fill="none" stroke="#C9A33A" stroke-width="1.1" stroke-linecap="round" opacity="0.5" filter="url(#rough)"/>
    <!-- Thread: env3 to env5 (long-range) -->
    <path d="M342.5,168 C420,65 520,68 574.5,162" fill="none" stroke="#C9A33A" stroke-width="0.8" stroke-linecap="round" opacity="0.3" filter="url(#rough)"/>
    <!-- Thread: env5 to env6 -->
    <path d="M574.5,162 C610,100 645,98 676.5,158" fill="none" stroke="#C9A33A" stroke-width="1.2" stroke-linecap="round" opacity="0.6" filter="url(#rough)"/>
    <!-- Thread: env4 to env6 (long-range) -->
    <path d="M463.5,165 C530,60 630,62 676.5,158" fill="none" stroke="#C9A33A" stroke-width="0.9" stroke-linecap="round" opacity="0.35" filter="url(#rough)"/>
    <!-- Thread: env3 to env6 (very long range) -->
    <path d="M342.5,168 C450,40 600,42 676.5,158" fill="none" stroke="#C9A33A" stroke-width="0.6" stroke-linecap="round" opacity="0.2" filter="url(#rough)"/>
  </g>

  <!-- BELOW the line: scattered disconnected dots (lost context) -->
  <g filter="url(#glow-soft)">
    <path d="M95,250 Q93,248 95,246 Q97,248 95,250 Z" fill="#C9A33A" stroke="none" opacity="0.2" filter="url(#rough)"/>
    <path d="M145,265 Q143,263 145,261 Q147,263 145,265 Z" fill="#C9A33A" stroke="none" opacity="0.18" filter="url(#rough)"/>
    <path d="M120,290 Q118,288 120,286 Q122,288 120,290 Z" fill="#C9A33A" stroke="none" opacity="0.15" filter="url(#rough)"/>
    <path d="M185,245 Q183,243 185,241 Q187,243 185,245 Z" fill="#C9A33A" stroke="none" opacity="0.2" filter="url(#rough)"/>
    <path d="M210,275 Q208,273 210,271 Q212,273 210,275 Z" fill="#C9A33A" stroke="none" opacity="0.17" filter="url(#rough)"/>
    <path d="M250,258 Q248,256 250,254 Q252,256 250,258 Z" fill="#C9A33A" stroke="none" opacity="0.18" filter="url(#rough)"/>
    <path d="M280,285 Q278,283 280,281 Q282,283 280,285 Z" fill="#C9A33A" stroke="none" opacity="0.14" filter="url(#rough)"/>
    <path d="M320,248 Q318,246 320,244 Q322,246 320,248 Z" fill="#C9A33A" stroke="none" opacity="0.19" filter="url(#rough)"/>
    <path d="M355,270 Q353,268 355,266 Q357,268 355,270 Z" fill="#C9A33A" stroke="none" opacity="0.16" filter="url(#rough)"/>
    <path d="M390,255 Q388,253 390,251 Q392,253 390,255 Z" fill="#C9A33A" stroke="none" opacity="0.2" filter="url(#rough)"/>
    <path d="M430,280 Q428,278 430,276 Q432,278 430,280 Z" fill="#C9A33A" stroke="none" opacity="0.15" filter="url(#rough)"/>
    <path d="M475,252 Q473,250 475,248 Q477,250 475,252 Z" fill="#C9A33A" stroke="none" opacity="0.18" filter="url(#rough)"/>
    <path d="M510,268 Q508,266 510,264 Q512,266 510,268 Z" fill="#C9A33A" stroke="none" opacity="0.16" filter="url(#rough)"/>
    <path d="M550,255 Q548,253 550,251 Q552,253 550,255 Z" fill="#C9A33A" stroke="none" opacity="0.17" filter="url(#rough)"/>
    <path d="M600,262 Q598,260 600,258 Q602,260 600,262 Z" fill="#C9A33A" stroke="none" opacity="0.15" filter="url(#rough)"/>
    <path d="M165,310 Q163,308 165,306 Q167,308 165,310 Z" fill="#C9A33A" stroke="none" opacity="0.12" filter="url(#rough)"/>
    <path d="M310,300 Q308,298 310,296 Q312,298 310,300 Z" fill="#C9A33A" stroke="none" opacity="0.13" filter="url(#rough)"/>
    <path d="M440,305 Q438,303 440,301 Q442,303 440,305 Z" fill="#C9A33A" stroke="none" opacity="0.12" filter="url(#rough)"/>
    <path d="M560,295 Q558,293 560,291 Q562,293 560,295 Z" fill="#C9A33A" stroke="none" opacity="0.13" filter="url(#rough)"/>
  </g>

  <!-- Tiny figure walking along the line from left to right -->
  <g filter="url(#glow)">
    <!-- head -->
    <path d="M620,192 Q617,188 620,184 Q623,188 620,192 Z" fill="none" stroke="#C9A33A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#rough)"/>
    <!-- body leaning forward (walking) -->
    <path d="M620,193 L622,207" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" opacity="0.9" filter="url(#rough)"/>
    <!-- left arm (back, slightly trailing) -->
    <path d="M621,198 C618,202 614,204 612,206" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.85" filter="url(#rough)"/>
    <!-- right arm (forward) -->
    <path d="M621,198 C624,200 628,200 631,199" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.85" filter="url(#rough)"/>
    <!-- left leg (back) -->
    <path d="M622,207 C619,213 617,217 615,221" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.85" filter="url(#rough)"/>
    <!-- right leg (forward stride) -->
    <path d="M622,207 C626,213 629,217 632,220" fill="none" stroke="#C9A33A" stroke-width="1" stroke-linecap="round" opacity="0.85" filter="url(#rough)"/>
  </g>

  <!-- Arrow at end of timeline indicating direction -->
  <g filter="url(#glow)">
    <path d="M732,194 L742,200 L732,206" fill="none" stroke="#C9A33A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#rough)"/>
  </g>
</svg>