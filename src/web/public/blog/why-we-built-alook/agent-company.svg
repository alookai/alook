    <path d="M260,210 C256,190 252,170 250,155" fill="none" stroke="#C9A33A" stroke-width="0.9" stroke-linecap="round" opacity="0.35" filter="url(#rough)"/>
    <path d="M330,190 C322,175 315,160 310,145" fill="none" stroke="#C9A33A" stroke-width="0.9" stroke-linecap="round" opacity="0.35" filter="url(#rough)"/>
