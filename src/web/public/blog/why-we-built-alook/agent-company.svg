    <path d="M300,55 Q299,54 300,53 Q301,54 300,55 Z" fill="#C9A33A" stroke="none" opacity="0.15" filter="url(#rough)"/>
    <path d="M360,48 Q359,47 360,46 Q361,47 360,48 Z" fill="#C9A33A" stroke="none" opacity="0.13" filter="url(#rough)"/>
    <path d="M400,42 Q399,41 400,40 Q401,41 400,42 Z" fill="#C9A33A" stroke="none" opacity="0.13" filter="url(#rough)"/>
    <path d="M440,48 Q439,47 440,46 Q441,47 440,48 Z" fill="#C9A33A" stroke="none" opacity="0.13" filter="url(#rough)"/>
    <path d="M500,55 Q499,54 500,53 Q501,54 500,55 Z" fill="#C9A33A" stroke="none" opacity="0.15" filter="url(#rough)"/>
    <path d="M620,85 Q619,84 620,83 Q621,84 620,85 Z" fill="#C9A33A" stroke="none" opacity="0.18" filter="url(#rough)"/>
