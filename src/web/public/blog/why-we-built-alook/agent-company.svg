    <path d="M340,260 C336,240 332,220 330,200" fill="none" stroke="#C9A33A" stroke-width="1.1" stroke-linecap="round" opacity="0.45" filter="url(#rough)"/>
    <path d="M400,245 L400,195" fill="none" stroke="#C9A33A" stroke-width="1.1" stroke-linecap="round" opacity="0.45" filter="url(#rough)"/>
    <path d="M460,260 C464,240 468,220 470,200" fill="none" stroke="#C9A33A" stroke-width="1.1" stroke-linecap="round" opacity="0.45" filter="url(#rough)"/>
