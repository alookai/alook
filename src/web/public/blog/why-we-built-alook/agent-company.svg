  </g>
  <!-- Agent circle A3 (center) -->
  <g filter="url(#glow-bright)">
    <path d="M400,260 Q392,253 400,245 Q408,253 400,260 Z" fill="none" stroke="#C9A33A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" filter="url(#rough)"/>
