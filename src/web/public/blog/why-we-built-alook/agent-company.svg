    <path d="M410,72 Q408,70 410,68 Q412,70 410,72 Z" fill="#C9A33A" stroke="none" opacity="0.25" filter="url(#rough)"/>
    <path d="M470,78 Q468,76 470,74 Q472,76 470,78 Z" fill="#C9A33A" stroke="none" opacity="0.25" filter="url(#rough)"/>
