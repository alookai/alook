<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#141210"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-bright" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Tiny person at bottom center, looking up -->
  <g filter="url(#glow)">
    <!-- head -->
    <path d="M400,345 Q396,340 400,335 Q404,340 400,345 Z" fill="none" stroke="#C9A33A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="1" filter="url(#rough)"/>
    <!-- body -->
    <path d="M400,346 L400,365" fill="none" stroke="#C9A33A" stroke-width="1.8" stroke-linecap="round" opacity="1" filter="url(#rough)"/>
    <!-- arms slightly out, relaxed -->
    <path d="M400,353 C396,357 392,360 388,362" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" opacity="1" filter="url(#rough)"/>
    <path d="M400,353 C404,357 408,360 412,362" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" opacity="1" filter="url(#rough)"/>
    <!-- legs -->
    <path d="M400,365 C397,372 395,377 393,382" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" opacity="1" filter="url(#rough)"/>
    <path d="M400,365 C403,372 405,377 407,382" fill="none" stroke="#C9A33A" stroke-width="1.3" stroke-linecap="round" opacity="1" filter="url(#rough)"/>
  </g>

  <!-- TIER 1: Nearest agents (large, bright) — connected to person -->
  <!-- Agent circle A1 (center-left) -->
  <g filter="url(#glow-bright)">
    <path d="M340,275 Q332,268 340,260 Q348,268 340,275 Z" fill="none" stroke="#C9A33A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" filter="url(#rough)"/>
  </g>
  <!-- Agent circle A2 (center-right) -->
