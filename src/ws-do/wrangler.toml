name = "alook-ws-do"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true
head_sampling_rate = 0.1

# Exempted from the default 0.1 sampling used by other workers: the
# `ws_frame_dropped_write` audit-loss signal is a rare-write category, and
# head-sampling is a request-level decision that can't be bypassed by log
# level. Full-rate ingest is affordable here — ws-do's log volume is
# dominated by daemon frames — and is the only reliable way to measure the
# audit-loss SLO. See plans/d1-critical-path-resilience-v2.md §Observability.
[observability.logs]
invocation_logs = true
head_sampling_rate = 1.0
destinations = ["grafana-logs"]

[observability.traces]
enabled = true
head_sampling_rate = 0.05
destinations = ["grafana-traces"]

# Must match DEV_PORTS.wsDo in src/shared/src/constants.ts
[dev]
port = 8789
inspector_port = 9230

[[d1_databases]]
binding = "DB"
database_id = "1593b87c-d8a8-4cdf-b6c0-c80d94442654"
database_name = "alook-app"

[[durable_objects.bindings]]
name = "WS_DO"
class_name = "WebSocketDurableObject"

[[durable_objects.bindings]]
name = "RATE_LIMIT_DO"
class_name = "RateLimitDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimitDurableObject"]
